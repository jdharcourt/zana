name: Zana
options:
  bundleIdPrefix: com.jdharcourt
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    exactVersion: 2.51.0
settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_PREVIEWS: YES
targets:
  Zana:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Zana
    resources:
      - path: Zana/Resources/Fonts
      - path: Zana/Assets.xcassets
    dependencies:
      - package: Supabase
    info:
      path: Zana/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
          - InstrumentSerif-Regular.ttf
          - InstrumentSerif-Italic.ttf
        SupabaseURL: https://ntlkrsfikgaimgaenwqk.supabase.co
        SupabasePublishableKey: sb_publishable_FIsyuP203Bgz9zfEWAWiIw_e2Ouercl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jdharcourt.Zana
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
